# This workflow builds a Docker image using Buildx and outputs it as a GHA artifact.
# The image is pushed to ECR by a separate push-ecr-image.yml workflow.
#
# By default, this workflow has NO AWS credentials, ensuring Dockerfile code cannot access them.
# When the Dockerfile pulls base images from a private ECR repo (e.g. spalk-ffmpeg), set
# ecr-role and ecr-region to authenticate Docker to ECR before the build. The provided role
# should be scoped to ECR pull permissions only (see ecr_base_image_pull role in Terraform).
# Note: when ecr-role is set, the caller workflow must grant `permissions: id-token: write`
# for OIDC role assumption.
#
# The image is exported as a Docker tarball, compressed with zstd, and uploaded as a GHA artifact.
name: Build ECR Image

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag for the Docker image (used in artifact naming)."
        required: true
        type: string
      dockerfile:
        description: "The Dockerfile to build"
        required: true
        type: string
      context:
        description: "Docker build context directory, relative to the repository root (e.g. apps/media/synchroniser for a monorepo caller). The SSH/gitconfig scaffold (docker/gitconfig, docker/ssh) resolves under this directory too. Note: `dockerfile` stays repository-root-relative. Default '.' preserves the standalone-repo behaviour."
        required: false
        type: string
        default: "."
      artifact-name:
        description: "Name for the uploaded artifact (must be unique within the workflow run)"
        required: true
        type: string
      build-args:
        description: "Docker build arguments (multiline string, one per line in KEY=VALUE format)"
        required: false
        type: string
        default: ""
      use-ssh:
        description: "Whether to use SSH for private repositories"
        required: false
        type: boolean
        default: false
      platforms:
        description: "Target platform for the build (e.g., linux/amd64 or linux/arm64)"
        required: false
        type: string
        default: "linux/amd64"
      runner:
        description: "The type of runner to use"
        required: false
        type: string
        default: "ubuntu-latest"
      compression-level:
        description: "Zstd compression level for the image tarball (1-19, higher = slower but smaller)"
        required: false
        type: number
        default: 3
      ecr-role:
        description: "AWS IAM role for ECR base image pull (only needed when Dockerfile uses private ECR base images). Should be scoped to pull-only permissions. Caller must set permissions: id-token: write for OIDC."
        required: false
        type: string
        default: ""
      ecr-region:
        description: "AWS region for ECR login (required when ecr-role is set)"
        required: false
        type: string
        default: "us-east-2"
      workspace-vendor:
        description: "Stage a module vendor/ into the build `context` from local go.work source so the Dockerfile builds offline (no `go mod download`, no keys in-container). Logic is locked in this reusable; the repo tree is data-only (no private fetch). Requires go-version. Default false = no-op, standalone callers unaffected."
        required: false
        type: boolean
        default: false
      go-version:
        description: "Go version for workspace-vendor (>= the go.work go directive). Required when workspace-vendor is true."
        required: false
        type: string
        default: ""
    secrets:
      ssh-private-key:
        description: "SSH keys for accessing private repositories during build."
        required: false
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact containing the image tarball"
        value: ${{ jobs.build-ecr-image.outputs.artifact-name }}

jobs:
  build-ecr-image:
    name: Build ECR Image
    runs-on: ${{ inputs.runner }}
    outputs:
      artifact-name: ${{ inputs.artifact-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      # Optional: authenticate to ECR so Docker can pull private base images (e.g. spalk-ffmpeg).
      # Uses a read-only IAM role scoped to ECR pull permissions only.
      - name: Configure AWS Credentials for ECR pull
        if: ${{ inputs.ecr-role != '' }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ inputs.ecr-role }}
          aws-region: ${{ inputs.ecr-region }}

      - name: Login to ECR for base images
        if: ${{ inputs.ecr-role != '' }}
        uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

      # Configure deploy SSH keys to download private repos
      # Note, you need to add Repo URL to the key comment so this action knows what to do with it
      # Details: https://github.com/SpalkLtd/ssh-agent#support-for-github-deploy-keys
      # Automated key rolling script: https://github.com/SpalkLtd/utils/blob/main/actions/deploy_keys.sh
      - name: Allow access to Spalk Private repositories
        uses: SpalkLtd/ssh-agent@26e485b72da53538f103f191ddd325d2f2ef3771
        if: ${{ inputs.use-ssh }}
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}

      # This action copies the ~/.gitconfig and ~/.ssh files from the host, that were configured by the previous SpalkLtd/ssh-agent
      # step to correctly access github. It corrects the paths. We are not copying actual private keys, they are held in-memory at all
      # times by the ssh-agent, and crypto functions are done over the env.SSH_AUTH_SOCK socket.
      # The docker/gitconfig + docker/ssh scaffold lives inside the build context
      # (the service directory in a monorepo), because the Dockerfile COPYs it with
      # context-relative paths. mkdir -p keeps this deterministic when a repo ships
      # the directories empty (git does not track empty dirs).
      - name: Collect Git and SSH config files
        if: ${{ inputs.use-ssh }}
        env:
          BUILD_CONTEXT: ${{ inputs.context }}
        run: |
          mkdir -p "$BUILD_CONTEXT/docker/gitconfig" "$BUILD_CONTEXT/docker/ssh"
          cp -f ~/.gitconfig "$BUILD_CONTEXT/docker/gitconfig/gitconfig"
          cp -r ~/.ssh/* "$BUILD_CONTEXT/docker/ssh"
          sed 's|/home/runner|/root|g' -i.bak "$BUILD_CONTEXT/docker/ssh/config"

      # Stage vendor/ into the build context (locked in this reusable, not caller-supplied).
      # Repo tree is data-only: GOVCS='*:off' blocks git so no dep can be cloned over the
      # deploy keys; go.work members must be in-tree; network replaces rejected.
      - name: Set up Go for workspace vendor
        if: ${{ inputs.workspace-vendor && inputs.go-version != '' }}
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
          cache: false

      - name: Stage workspace vendor into build context
        if: ${{ inputs.workspace-vendor }}
        env:
          CONTEXT: ${{ inputs.context }}
          GO_VERSION: ${{ inputs.go-version }}
          # SECURITY backstop: GOVCS='*:off' stops go from invoking git/VCS for ANY
          # module, so an attacker-named non-local dep cannot be cloned over the deploy
          # keys. (A GOPROXY 404 — even with GOPROXY=off — otherwise falls back to
          # `git ls-remote`, which the runner's insteadOf turns into an SSH clone.)
          # GOPRIVATE keeps private paths off the public proxy/sumdb; public third-party
          # still vendors via the proxy (proxy fetches are not VCS, so GOVCS allows them).
          GOVCS: "*:off"
          GOPRIVATE: "github.com/SpalkLtd/*"
          GOPROXY: "https://proxy.golang.org"
          # -mod=mod so the metadata/edit commands below ignore any vendor/ the repo
          # may already ship (otherwise go defaults to -mod=vendor and errors on the
          # in-flight go.mod edits). go mod vendor itself regenerates vendor/ regardless.
          GOFLAGS: "-mod=mod"
          GOTOOLCHAIN: local
        run: |
          set -euo pipefail
          # (#1) never vendor on the runner's stock Go — the version guarantee would be void.
          if [ -z "$GO_VERSION" ]; then
            echo "::error::workspace-vendor requires go-version (>= the go.work go directive)"; exit 1
          fi
          [ -f go.work ] || { echo "::error::workspace-vendor requires a go.work at the repository root"; exit 1; }
          [ -f "$CONTEXT/go.mod" ] || { echo "::error::no go.mod in build context '$CONTEXT'"; exit 1; }

          root="$(pwd -P)"
          self="$(cd "$CONTEXT" && GOWORK=off go list -m)"

          # (#3) reject any go.work-level replace with a version — a network replace is
          # an attacker-directed fetch; only local-path replaces are allowed.
          if go work edit -json | jq -e '[.Replace // [] | .[] | select((.New.Path // "") as $p | (($p|startswith("./")) or ($p|startswith("../")) or ($p|startswith("/"))) | not)] | length > 0' >/dev/null; then
            echo "::error::refusing a versioned (network) go.work replace — workspace-vendor allows local replaces only"; exit 1
          fi

          # Derive replaces from go.work members (source of truth). Collect into an array
          # in THIS shell (process substitution, not a pipe) so set -e holds. Replace
          # targets are ABSOLUTE (no GNU-only realpath); the staged go.mod is never
          # committed and -mod=vendor in the container never reads the target.
          declare -a edits=()
          while IFS= read -r disk; do
            case "$disk" in /*) d="$disk" ;; *) d="$root/${disk#./}" ;; esac
            d_abs="$(cd "$d" 2>/dev/null && pwd -P)" || { echo "::error::go.work member not found: $disk"; exit 1; }
            # (#3) path-traversal guard: member must resolve inside the repo tree.
            case "$d_abs/" in "$root"/*) : ;; *) echo "::error::go.work member '$disk' resolves outside the repo tree — refusing"; exit 1 ;; esac
            # no silent skip: a member that has no go.mod, or whose module can't be read,
            # is fatal — a skip would drop its replace and re-open the fetch path.
            [ -f "$d_abs/go.mod" ] || { echo "::error::go.work member '$disk' has no go.mod"; exit 1; }
            mod="$(cd "$d_abs" && GOWORK=off go list -m)" || { echo "::error::cannot read module in go.work member '$disk'"; exit 1; }
            if [ "$mod" = "$self" ]; then continue; fi
            edits+=("$mod=$d_abs")
          done < <(go work edit -json | jq -r '.Use[].DiskPath')
          # local go.work-level replaces (validated version-free above): absolutise any
          # relative target from the repo root; reject anything that isn't a path.
          while IFS=$'\t' read -r old new; do
            [ -n "$old" ] || continue
            case "$new" in
              /*) : ;;
              ./*|../*) new="$root/$new" ;;
              *) echo "::error::unsupported go.work replace target '$new'"; exit 1 ;;
            esac
            edits+=("$old=$new")
          done < <(go work edit -json | jq -r '.Replace // [] | .[] | "\(.Old.Path)\t\(.New.Path)"')

          # (#5) apply atomically + idempotently via `go mod edit` (safe on job retry;
          # no non-idempotent >> append).
          for e in "${edits[@]}"; do ( cd "$CONTEXT" && go mod edit -replace "$e" ); done

          # Friendly early error: a direct first-party require that isn't a go.work
          # member is almost always a missing member — fail with a clear message before
          # GOVCS='*:off' hard-stops it. (GOVCS is the real backstop; it also covers the
          # transitive / non-SpalkLtd cases this direct-require scan does not.)
          unreplaced="$(cd "$CONTEXT" && go mod edit -json | jq -r '
            (.Replace // [] | map(.Old.Path)) as $r
            | (.Require // [])[] | .Path
            | select(test("^github.com/SpalkLtd/"))
            | select(. as $p | ($r | index($p)) == null)')"
          if [ -n "$unreplaced" ]; then
            echo "::error::first-party dep(s) not a go.work member (would be fetched over the network): $unreplaced"; exit 1
          fi

          ( cd "$CONTEXT" && GOWORK=off go mod vendor )
          echo "workspace-vendor: staged $CONTEXT/vendor/ ($(grep -c '^# ' "$CONTEXT/vendor/modules.txt" 2>/dev/null || echo 0) modules)"

      - name: Build docker image to tarball
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          ssh: ${{ inputs.use-ssh && secrets.ssh-private-key != '' && format('default={0}', env.SSH_AUTH_SOCK) || '' }}
          context: ${{ inputs.context }}
          build-args: ${{ inputs.build-args }}
          push: false
          tags: image:${{ inputs.tag }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha,scope=${{ inputs.artifact-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.artifact-name }}
          file: ${{ inputs.dockerfile }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Compress image tarball
        run: zstd -${{ inputs.compression-level }} -T0 /tmp/image.tar -o /tmp/image.tar.zst

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ inputs.artifact-name }}
          path: /tmp/image.tar.zst
          retention-days: 1
          if-no-files-found: error
