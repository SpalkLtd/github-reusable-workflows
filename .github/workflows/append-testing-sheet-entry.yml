# This inserts an entry into the "Testing Sheet" which pulls the  
# information from the PR request body, reducing the number of context switches to 
# fill out all the required CI steps
# Requires a google Service Account https://cloud.google.com/iam/docs/service-accounts
# and that you share the spreadsheet with the service account's email as an editor.
name: Insert entry in Testing Sheet

on:
  workflow_call:
    inputs:
      repo:
        description: 'Github repo string. Eg synchroniser'
        required: true
        type: string
      pr_description:
        description: 'Github PR Description message. Usually: github.event.pull_request.body'
        required: true
        type: string
      pr_title:
        description: 'Github PR Title. Usually: github.event.pull_request.title'
        required: true
        type: string
      pr_author:
        description: 'Github PR Author. Usually: github.event.pull_request.user.login'
        required: true
        type: string
      pr_number:
        description: 'Github PR Number. Usually: github.event.pull_request.number'
        required: true
        type: string
      worksheet_title:
        description: 'Worksheet title to edit'
        required: true
        type: string
    secrets:
      GSHEET_CLIENT_EMAIL:
        description: 'Github commit message. Usually: github.event.head_commit.message'
        required: true
      GSHEET_PRIVATE_KEY:
        description: 'Github commit message. Usually: github.event.head_commit.message'
        required: true
      SPREADSHEET_ID:
        description: 'Google Sheet ID'
        required: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  insert_row:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    - name: Parse PR and build gsheet commands
      id: build_commands
      uses: actions/github-script@v7
      with:
        script: |
          const prTitle = process.env.PR_TITLE;
          const prDesc = process.env.PR_DESCRIPTION;
          const repo = process.env.REPO;
          const prAuthor = process.env.PR_AUTHOR;
          const prNumber = process.env.PR_NUMBER;
          const worksheetTitle = process.env.WORKSHEET_TITLE;

          const match = (text, regex) => {
            const m = text.match(regex);
            return m ? m[1].trim() : '';
          };

          const ticketNumber = match(prTitle, /(SA-\d+)/);
          const oldTesterCount = match(prDesc, /Old:\s*(P\d*)/);
          const newTesterCount = match(prDesc, /New:\s*(P\d*)/);
          const testInstructions = match(prDesc, /## Instructions([\s\S]*?)## Number of Testers/);
          const featureFlagName = match(prDesc, /Feature Flag Name:(.*)/);
          const envVars = match(prDesc, /Has New ENV\/Config\.json Vars:(.*)/);
          const tfChanges = match(prDesc, /Has TF Changes:(.*)/);
          const dependentRepo = match(prDesc, /Dependant on Repo:(.*)/);

          core.info(`TICKET_NUMBER=${ticketNumber}`);
          core.info(`OLD_TESTER_COUNT=${oldTesterCount}`);
          core.info(`NEW_TESTER_COUNT=${newTesterCount}`);
          core.info(`TEST_INSTRUCTIONS=${testInstructions}`);
          core.info(`FEATURE_FLAG_NAME=${featureFlagName}`);
          core.info(`ENV_VARS=${envVars}`);
          core.info(`TF_CHANGES=${tfChanges}`);
          core.info(`DEPENDENT_REPO=${dependentRepo}`);

          // Build a clickable hyperlink for the PR title
          const prUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/pull/${prNumber}`;
          const safeTitle = prTitle.replace(/"/g, '""');
          const prTitleLink = `=HYPERLINK("${prUrl}","${safeTitle}")`;

          // Prefix with ' to prevent USER_ENTERED interpreting values as formulas
          const t = (v) => `'${v}`;

          // JSON.stringify handles all escaping automatically
          const commands = JSON.stringify([
            {
              command: 'appendData',
              args: {
                data: [[
                  prTitleLink,
                  t(repo),
                  t(ticketNumber),
                  'PR',
                  '',
                  '',
                  t(oldTesterCount),
                  t(newTesterCount),
                  t(testInstructions),
                  t(prAuthor),
                  t(featureFlagName),
                  t(envVars),
                  t(tfChanges),
                  t(dependentRepo),
                  t(prNumber)
                ]],
                worksheetTitle: worksheetTitle,
                minCol: 1,
                valueInputOption: 'USER_ENTERED'
              }
            }
          ]);

          core.setOutput('commands', commands);
      env:
        PR_TITLE: ${{ inputs.pr_title }}
        PR_DESCRIPTION: ${{ inputs.pr_description }}
        REPO: ${{ inputs.repo }}
        PR_AUTHOR: ${{ inputs.pr_author }}
        PR_NUMBER: ${{ inputs.pr_number }}
        WORKSHEET_TITLE: ${{ inputs.worksheet_title }}

    - id: insert_row
      uses: SpalkLtd/gsheet.action@v1.2.0
      with:
        spreadsheetId: "${{ secrets.SPREADSHEET_ID }}"
        commands: ${{ steps.build_commands.outputs.commands }}
      env:
        GSHEET_CLIENT_EMAIL: ${{ secrets.GSHEET_CLIENT_EMAIL }}
        GSHEET_PRIVATE_KEY: ${{ secrets.GSHEET_PRIVATE_KEY }}


